id: delete_confirmed
description: Deletes an event only after explicit user confirmation
tags: [crud, safety_confirmation]
runs: 2
users:
  - email: alice@example.com
    display_name: Alice
seed_events:
  - user: alice@example.com
    title: One-on-one
    start: "2026-06-15T15:00:00+05:30"
    end: "2026-06-15T15:30:00+05:30"
sessions:
  - user: alice@example.com
    turns:
      - "Cancel my one-on-one at 3pm today."
      - "Yes, delete it."
expect:
  events:
    - user: alice@example.com
      title_contains: one-on-one
      present: false
  trajectory:
    must_call: [delete_event]
  judge:
    - criterion: The assistant confirmed the event was deleted.
